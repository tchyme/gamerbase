name: GamerBase CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── CI: Test ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Run tests
        working-directory: ./app
        run: npm test
        env:
          DB_HOST: localhost
          DB_USER: gamerbase
          DB_PASSWORD: gamerbase123
          DB_NAME: gamerbase

  # ─── CD: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: self-hosted        # 👈 this is the only change
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild and restart containers
        run: |
          cd /mnt/c/Users/Techstarter\ Admin/gamerbase
          docker compose down
          docker compose up -d --build
          docker image prune -f
          echo "✅ GamerBase deployed successfully"