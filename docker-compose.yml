services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gamerbase
      POSTGRES_PASSWORD: gamerbase123
      POSTGRES_DB: gamerbase
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamerbase"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    environment:
      DB_HOST: db
      DB_USER: gamerbase
      DB_PASSWORD: gamerbase123
      DB_NAME: gamerbase
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
